<!DOCTYPE html>
<html lang="pt-br" data-bs-theme ="dark">
<head>
    <title>Projeto</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="bootstrap-5.3.6-dist/css/bootstrap.min.css">
    <script type="text/javascript" src="vue.js"></script>
    <script type="text/javascript" src="axios.min.js"></script>
    <style>
        .image {
            max-width: 300px; 
            height: auto;     
        }
    </style>
</head>
<body>
 <div id="app" class="container"> 
    <div class="row">
        <img src="livraria.jpeg" alt="Sala de uma biblioteca" class="image">
    </div>
    <div class="row mt-3">
        <div class="col-md-6">
            <h1>Cadastro de Livros</h1>
            <input type="number" class="form-control mb-2" placeholder="Código" v-model="codigo">
            <input type="text" class="form-control mb-2" placeholder="Título"v-model= "titulo">
            <input type="text" class="form-control mb-2" placeholder="Editora" v-model ="editora">
            <input type="number" class="form-control mb-2" placeholder="Ano de Publicação" v-model="ano">
            <input type="number" class="form-control mb-2" placeholder="Valor" v-model="valor">

            <div v-if="validar()">
            <button class="btn btn-success"@click="salvar()">Salvar</button>
            </div>
            <div v-else>
              <button class="btn btn-secondary" disabled> Salvar</button>
            </div>
        </div>
        <div class="col-md-6">
            <h1>Lista de Livros</h1>
            <table class = "table table-striped">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Título</th>
                        <th>Editora</th>
                        <th>Ano de Publicação</th>
                        <th>Valor</th>
                        <th>Alterar</th>
                        <th>Excluir</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="(livro,index) in listaLivros">
                        <td>{{livro.codigo}}</td>
                        <td>{{livro.titulo}}</td>
                        <td>{{livro.editora}}</td>
                        <td>{{livro.ano}}</td>
                        <td>{{livro.valor | reais }}</td>
                        <td><a href ='#'@click="alterar(index)"><img src="images.png" alt="Alterar" width="25"></a></td>
                        <td><a href ='#'@click="excluir(index)"><img src="images (1).png" alt="Excluir"width="25"></a></td>
                    </tr>
                </tbody>
            </table>
            <div>
                <b>Total: </b> {{ total | reais }}
            </div>
        </div>
    </div>
 </div> 
 <script type="text/javascript" >
    class Livro {
        constructor(codigo, titulo, editora, ano, valor){
            this.codigo = codigo;
            this.titulo = titulo;
            this.editora = editora;
            this.ano = ano;
            this.valor = valor;
        }
    }

    let app = new Vue({
        el:'#app',
        data:{
            codigo: 1,
            titulo: "",
            editora: "",
            ano: "",
            valor: "",
            listaLivros: [],
            posicao: -1,
        }, 
        methods: {
            validar: function() {
                return (this.codigo && this.titulo && this.ano && this.valor);
            },
            salvar: function() {
                let novoLivro = new Livro (this.codigo, this.titulo, this.editora, this.ano, this.valor );
                if(this.posicao > -1){
                    Vue.set (this.listaLivros, this.posicao, novoLivro);
                    this.posicao = -1;
                }else {
                    this.listaLivros.push (novoLivro);
                }
                this.codigo++;
                this.titulo = '';
                this.editora = '';
                this.ano = '';
                this.valor ='';
                localStorage.setItem('listaLivros', JSON.stringify(this.listaLivros));
            },
            alterar: function (posicao) {
                this.posicao = posicao;
                this.codigo = this.listaLivros[posicao].codigo;
                this.titulo = this.listaLivros[posicao].titulo;
                this.editora = this.listaLivros[posicao].editora;
                this.ano = this.listaLivros[posicao].ano;
                this.valor = this.listaLivros[posicao].valor;
            
            },
            excluir : function(pos){
                if (confirm ("Tem certeza que deseja excluir o livro?")) {
                    this.listaLivros.splice(pos,1);
                    localStorage.setItem('listaLivros', JSON.stringify(this.listaLivros));

                }
            }
        },
        computed: {
            total: function (){
                let subtotal =0;
                for (let i =0; i < this.listaLivros.length; i++) {
                    subtotal += parseFloat (this.listaLivros [i].valor);

                }
                return subtotal;
            }
        },
        filters : {
            reais: function (valor) {
                valor = parseFloat (valor);
                return 'R$' + valor.toFixed(2).replace('.', ',');
            }
        },
        created() {
            /*let endpoint ='https://openlibrary.org/search.json?q=learning+javascript';
            axios.get (endpoint).then((resposta)=> {
                let livros = resposta.data.docs;
                for (let i = 0; i < livros.length; i++) {
                    let novoLivro = new Livro (this.codigo, livros [i].title, 'OpenLibrary', livros [i].first_publish_year,10);
                    this.listaLivros.push(novoLivro);
                    this.codigo++;
                }
            });*/
            if (localStorage.getItem('listaLivros')) {
                this.listaLivros = JSON.parse(localStorage.getItem('listaLivros'));
                this.codigo = this.listaLivros.length + 1;
            }
        }

    });

 </script> 
</body>
</html>
